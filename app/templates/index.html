{% extends "base.html" %}

{% block title %}聊天室 — IntelliTrans 消息站{% endblock %}

{% block content %}
<div class="chat-layout">
  <!-- Sidebar: group & private sessions -->
  <aside class="room-panel">
    <h2 class="panel-title">会话</h2>

    <section class="sidebar-section">
      <div class="sidebar-headline">
        <h3 class="sidebar-subtitle">群聊</h3>
        <button class="mini-btn" id="createGroupBtn" type="button">新建</button>
      </div>
      <ul class="room-list" id="groupList"></ul>
    </section>

    <section class="sidebar-section">
      <div class="sidebar-headline">
        <h3 class="sidebar-subtitle">私聊会话</h3>
      </div>
      <ul class="room-list" id="privateList"></ul>
    </section>

    <section class="sidebar-section">
      <h3 class="sidebar-subtitle">在线用户（点名发起私聊）</h3>
      <ul class="user-list" id="userList">
        <li class="user-item user-item--empty">暂无在线用户</li>
      </ul>
    </section>
  </aside>

  <!-- Main chat area -->
  <section class="chat-panel">
    <div class="chat-header">
      <span id="currentRoom">👥 大厅</span>
      <span class="room-type-tag" id="roomTypeTag">群聊</span>
    </div>

    <ul class="message-list" id="messageList" aria-live="polite"></ul>

    <form class="message-form" id="messageForm">
      <input
        id="messageInput"
        type="text"
        placeholder="输入消息，按回车发送…"
        autocomplete="off"
        maxlength="500"
      />
      <button type="submit">发送</button>
    </form>
  </section>
</div>

<div class="translation-modal hidden" id="translationModal" aria-hidden="true">
  <div class="translation-card" role="dialog" aria-modal="true" aria-labelledby="translationTitle">
    <h3 id="translationTitle">手动翻译消息</h3>
    <p class="translation-hint" id="translationSourcePreview"></p>

    <label for="targetLanguageSelect">目标语言</label>
    <select id="targetLanguageSelect">
      <option value="zh-CN">中文（简体）</option>
      <option value="en">English</option>
      <option value="ja">日本語</option>
      <option value="ko">한국어</option>
      <option value="es">Español</option>
      <option value="fr">Français</option>
      <option value="de">Deutsch</option>
      <option value="custom">手动输入…</option>
    </select>

    <input
      id="targetLanguageInput"
      class="hidden"
      type="text"
      placeholder="例如：it / Italian / 繁体中文"
      maxlength="40"
    />

    <div class="translation-actions">
      <button type="button" class="btn-secondary" id="cancelTranslateBtn">取消</button>
      <button type="button" id="confirmTranslateBtn">开始翻译</button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
<script>
  // Expose current user to JS
  const CURRENT_USER = {{ current_user.username | tojson }};
</script>
<script src="{{ url_for('static', filename='js/chat.js') }}"></script>
{% endblock %}
